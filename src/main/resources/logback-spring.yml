logging:
  level:
    root: INFO
    org.herb: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  file:
    name: logs/herb.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
